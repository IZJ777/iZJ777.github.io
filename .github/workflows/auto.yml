name: "Refresh Packages"

on:
  push:
    paths:
      - 'debs/**' # 只有当 debs 文件夹内有新的 .deb 插件上传或修改时，才触发此脚本
  workflow_dispatch: # 允许你在 GitHub 网页端手动点击按钮触发刷新

# 显式声明赋予脚本对仓库的写入权限，防止 Push 时报 Permission Denied 错误
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整拉取分支历史，确保 git push 顺畅

      - name: Install Debian Package Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev bzip2 xz-utils zstd

      - name: Generate Sileo Package Index
        run: |
          # 1. 先安全清理旧的索引文件，防止残留干扰
          rm -f ./Packages ./Packages.bz2 ./Packages.xz ./Packages.zst
          
          # 2. 核心：扫描 debs 目录，生成标准的 Packages 索引
          dpkg-scanpackages -m ./debs /dev/null > ./Packages
          
          # 3. 制作各种越狱包管理器需要的压缩格式（全面兼容 Sileo, Zebra, Cydia）
          bzip2 -c -9 ./Packages > ./Packages.bz2
          xz -c -9 --extreme ./Packages > ./Packages.xz
          zstd -c -19 ./Packages > ./Packages.zst
          
          echo "✅ 越狱源索引文件全部生成成功！"

      - name: Configure Git Bot
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action Bot'

      - name: Commit and Push Changes
        run: |
          # 将生成的四个核心索引文件强行加入暂存区
          git add Packages Packages.bz2 Packages.xz Packages.zst
          
          # 检查文件是否有实际变动，有变动则提交并推送到 main 分支
          if git diff --staged --quiet; then
            echo "没有检测到索引文件变化，跳过推送。"
          else
            git commit -m 'Release: Auto-refresh Packages index [skip ci]'
            git push origin HEAD:main
          fi
